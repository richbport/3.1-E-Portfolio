<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src="https://kit.fontawesome.com/97ae6985a4.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <section id="about-me">
      <nav>
        <div class="personal__logo">Rich Port</div>
        <ul class="nav__link--list">
          <li>
            <a href="" class="
            nav__link--anchor
            link__hover-effect
            link__hover-effect--black
            ">Languages</a>
          </li>
          <li>
            <a href="" class="
            nav__link--anchor
            link__hover-effect
            link__hover-effect--black
            ">Projects</a>
          </li>
          <li>
            <a href="" class="
            nav__link--anchor
            nav__link--anchor-primary
            ">Contact</a>
          </li>
        </ul>
      </nav>
      <div class="flex flex-1">
        <div class="about-me__info row">
          <div class="about-me__info--container">
            <figure class="about-me__picture--mask">
              <img src="./assets/Rich_Port_with_Painting.jpg" class="about-me__picture" alt="Picture of Me.">
            </figure>
            <h1 class="about-me__info--title">
              Hi, I'm <span class="text--purple">Rich Port</span> 👋
            </h1>
            <p class="about-me__info--para">I'm a <strong class="text--purple">frontend software engineer</strong> with a joy for building responsive web apps that make for great user experiences!</p>
            <div class="about-me__links">
              <a href="" class="about-me__link">
                <i class="fa-brands fa-linkedin"></i>
              </a>
              <a href="" class="about-me__link">
                <i class="fa-brands fa-github"></i>
              </a>
              <a href="" class="about-me__link">
                <i class="fa-solid fa-envelope"></i>
              </a>
              <a href="" class="about-me__link">
                <i class="fa-solid fa-file-pdf"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
</body>
</html>
